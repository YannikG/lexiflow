[project]
name = "lexiflow-ui"
version = "0.0.0"
description = "PySide6 application shell for LexiFlow"
requires-python = ">=3.12,<3.14"
dependencies = [
    "lexiflow-core",
    "PySide6>=6.8",
    "qt-material>=2.14",
]

[tool.uv.sources]
lexiflow-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexiflow_ui"]
