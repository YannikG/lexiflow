[project]
name = "lexiflow-worker"
version = "0.0.0"
description = "Worker entrypoint for LexiFlow background jobs"
requires-python = ">=3.12,<3.14"
dependencies = [
    "lexiflow-core",
]

[tool.uv.sources]
lexiflow-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexiflow_worker"]

[project.scripts]
lexiflow-worker = "lexiflow_worker.__main__:main"
