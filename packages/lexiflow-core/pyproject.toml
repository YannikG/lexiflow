[project]
name = "lexiflow-core"
version = "0.0.0"
description = "Domain logic, storage, jobs, and LLM/embed abstractions for LexiFlow"
requires-python = ">=3.12,<3.14"
dependencies = [
    "tomli-w>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lexiflow_core"]

[tool.hatch.build.targets.wheel.force-include]
"src/lexiflow_core/migrations" = "lexiflow_core/migrations"
"src/lexiflow_core/migrations/queue" = "lexiflow_core/migrations/queue"
