# Phase 01: real quality gates (replaces Phase 00 placeholders)

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy (lexiflow-core)
        run: uv run mypy packages/lexiflow-core

  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Pytest with coverage
        run: uv run pytest
